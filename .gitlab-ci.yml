workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - build
  - deploy
  - rollback

variables:
  APP_NAME: ims-ai-studio-recorder
  APP_PORT: "9019"
  CONTAINER_PORT: "80"
  DOMAIN: recorder.ims.ews.gic.ericsson.se

build:
  stage: build
  tags:
    - ims-ews-builder
  script:
    - echo "[build] Building Docker image $APP_NAME"
    - docker --version
    - docker build -t "$APP_NAME:$CI_COMMIT_SHORT_SHA" -t "$APP_NAME:latest" .
    - echo "[build] Image built successfully"
    - docker images --filter "reference=$APP_NAME" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

deploy:
  stage: deploy
  tags:
    - ims-ews-builder
  environment:
    name: production
  resource_group: production
  needs:
    - build
  script:
    - set -e
    - export IMAGE_TAG="$APP_NAME:$CI_COMMIT_SHORT_SHA"
    - echo "[deploy] Deploying $IMAGE_TAG on port $APP_PORT"
    # Check if port is available (skip if our own container is using it)
    - >-
      if docker ps --format '{{.Names}}' | grep -Eq "^$APP_NAME$"; then
      echo "[deploy] Port $APP_PORT is used by our own container, will replace it";
      else
      if ss -tlnp | grep -q ":$APP_PORT "; then
      echo "[deploy] ERROR: Port $APP_PORT is already in use by another process" && ss -tlnp | grep ":$APP_PORT " && exit 1;
      fi;
      echo "[deploy] Port $APP_PORT is available";
      fi
    # Save current image as :previous for rollback
    - >-
      if docker ps -a --format '{{.Names}}' | grep -Eq "^$APP_NAME$"; then
      CURRENT_IMAGE_ID="$(docker inspect -f '{{.Image}}' "$APP_NAME")";
      if [ -n "$CURRENT_IMAGE_ID" ]; then docker tag "$CURRENT_IMAGE_ID" "$APP_NAME:previous"; fi;
      fi
    # Stop and remove existing container
    - if docker ps -a --format '{{.Names}}' | grep -Eq "^$APP_NAME$"; then docker rm -f "$APP_NAME"; fi
    # Start new container
    - docker run -d --name "$APP_NAME" --restart unless-stopped -p "$APP_PORT:$CONTAINER_PORT" "$IMAGE_TAG"
    - echo "[deploy] Waiting for health check..."
    - sleep 3
    - curl -fsS "http://127.0.0.1:$APP_PORT/health" || (echo "[deploy] Health check failed" && docker logs "$APP_NAME" && exit 1)
    - echo "[deploy] Deployment successful"
    - docker ps --filter "name=$APP_NAME" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
    # Ensure domain is registered in gateway
    - >-
      if ! docker exec ims-proxy test -f /etc/nginx/conf.d/recorder.conf; then
        echo "[deploy] Registering domain $DOMAIN -> port $APP_PORT";
        printf '%s\n'
          "# IMS AI Studio Recorder — $DOMAIN → :$APP_PORT"
          "server {"
          "    listen 80;"
          "    server_name $DOMAIN;"
          ""
          "    location / {"
          "        proxy_pass http://host.docker.internal:$APP_PORT;"
          "        include /etc/nginx/snippets/proxy-headers.conf;"
          "    }"
          "}" > /tmp/recorder.conf;
        docker cp /tmp/recorder.conf ims-proxy:/etc/nginx/conf.d/recorder.conf;
        docker exec ims-proxy nginx -t && docker exec ims-proxy nginx -s reload;
        echo "[deploy] Domain $DOMAIN registered and nginx reloaded";
      else
        echo "[deploy] Domain config already exists in gateway";
      fi

rollback:
  stage: rollback
  tags:
    - ims-ews-builder
  environment:
    name: production
  resource_group: production
  when: manual
  allow_failure: true
  script:
    - set -e
    - echo "[rollback] Rolling back $APP_NAME to previous image"
    - docker image inspect "$APP_NAME:previous" > /dev/null
    - if docker ps -a --format '{{.Names}}' | grep -Eq "^$APP_NAME$"; then docker rm -f "$APP_NAME"; fi
    - docker run -d --name "$APP_NAME" --restart unless-stopped -p "$APP_PORT:$CONTAINER_PORT" "$APP_NAME:previous"
    - sleep 3
    - curl -fsS "http://127.0.0.1:$APP_PORT/health" || (echo "[rollback] Health check failed" && exit 1)
    - echo "[rollback] Rollback successful"
    - docker ps --filter "name=$APP_NAME" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
